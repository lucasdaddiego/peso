name: Python checks

# Lint (ruff), types (mypy) and the offline unit-test suite with a hard 100% coverage gate.
# These are fast and need no network — distinct from data.yml, which actually re-fetches the
# source series and re-validates the artifact. Path-filtered to the Python sources + config.

on:
  pull_request:
    paths:
      - "pipeline/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"
  push:
    branches: [master, main]
    paths:
      - "pipeline/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint + types + tests (100% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync deps (incl. dev group)
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check pipeline tests
      - name: Format check (ruff)
        run: uv run ruff format --check pipeline tests
      - name: Types (mypy)
        run: uv run mypy
      - name: Tests + coverage (fails under 100%)
        run: uv run pytest --cov=pipeline --cov-branch --cov-report=term-missing
