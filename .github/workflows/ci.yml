name: CI (web)

# Web typecheck + unit tests (100% coverage gate) + production build. Path-filtered so it only
# runs when the web app changes; the data pipeline has its own workflows.

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [master, main]
    paths:
      - "web/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        run: npm ci
        working-directory: web
      - name: Unit tests + coverage (100% gate)
        run: npm run test:cov
        working-directory: web
      - name: Typecheck + build
        run: npm run build
        working-directory: web
